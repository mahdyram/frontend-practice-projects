<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>QR Code Component</title>
        <style>
            body {
                background-color: hsl(212, 45%, 89%);
                font-family: "Outfit", sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }

            .card {
                background-color: hsl(0, 0%, 100%);
                border-radius: 20px;
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
                max-width: 320px;
                padding: 16px;
                text-align: center;
            }

            .card img {
                width: 100%;
                border-radius: 10px;
            }

            .card h1 {
                font-size: 1.2rem;
                margin: 20px 0 10px;
                color: hsl(218, 44%, 22%);
            }

            .card p {
                font-size: 0.9rem;
                color: hsl(220, 15%, 55%);
                margin: 0 0 20px;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <img
                src="https://i.ibb.co/bKwGY54/image-qr-code.png"
                alt="QR Code"
            />
            <h1>Improve your front-end skills by building projects</h1>
            <p>
                Scan the QR code to visit Frontend Mentor and take your coding
                skills to the next level
            </p>
        </div>
    </body>
</html>
