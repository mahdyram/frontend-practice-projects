<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scroll Animation</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }

    .box {
      opacity: 0;
      transform: translateX(-100px);
      transition: all 0.6s ease;
      background: #3498db;
      color: white;
      padding: 40px;
      margin: 100px auto;
      width: 80%;
      max-width: 600px;
      border-radius: 10px;
    }

    .box.show {
      opacity: 1;
      transform: translateX(0);
    }

    .box.right {
      transform: translateX(100px);
    }

    .box.right.show {
      transform: translateX(0);
    }
  </style>
</head>
<body>

  <div class="box left">Box 1 from left</div>
  <div class="box right">Box 2 from right</div>
  <div class="box left">Box 3 from left</div>
  <div class="box right">Box 4 from right</div>

  <script>
    const boxes = document.querySelectorAll('.box');

    function checkBoxes() {
      const triggerBottom = window.innerHeight * 0.8;

      boxes.forEach(box => {
        const boxTop = box.getBoundingClientRect().top;

        if (boxTop < triggerBottom) {
          box.classList.add('show');
        } else {
          box.classList.remove('show');
        }
      });
    }

    window.addEventListener('scroll', checkBoxes);
  </script>

</body>
</html>
