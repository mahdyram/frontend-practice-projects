<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>this vs e.target</title>
    <style>
      #outer {
        width: 300px;
        height: 200px;
        background-color: lightblue;
        padding: 20px;
      }

      #inner {
        width: 100px;
        height: 100px;
        background-color: coral;
      }
    </style>
  </head>
  <body>
    <!-- this vs e.target -->
    <div id="outer">
      Outer
      <div id="inner">Inner</div>
    </div>
    <p id="p11"></p>

    <script>
      const outer = document.getElementById("outer");

      outer.addEventListener("click", function (e) {
        // this → خود outer
        this.style.backgroundColor = "lightgreen";

        // e.target → هر چیزی که واقعا کلیک شد
        e.target.style.backgroundColor = "yellow";

        document.getElementById(
          "p11"
        ).innerText = `this: ${this.id} | e.target: ${e.target.id}`;
      });
    </script>
  </body>
</html>
